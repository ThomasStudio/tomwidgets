[win]
dir = dir
explorer = explorer .
ip = ipconfig
netstat = netstat -ano
code = code .
calc = start calc
cmd = start "" cmd

[url]
bing = start msedge https://www.bing.com/
url = start msedge {url}
private = start msedge --inprivate {url}

[python]
create_env = python -m venv .venv
install = pip install {package_name}
activate = .venv\Scripts\activate
deactivate = .venv\Scripts\deactivate
version = python --version

[git]
commit = git commit -am "{commit_comment}"
add = git add .
status = git status
diff = git diff
show_br = git branch
checkout = git checkout {branch_name}
merge = git merge {branch_name}
push = git push
pull = git pull
pull_main = git pull origin main
pull_dev = git pull origin dev
init = git init
clone = git clone {repo_url}
list_config = git config --list
delete_br = git branch -d {branch_name}

[adb]
install = adb install {apk_path}
home = adb shell input keyevent 3
back = adb shell input keyevent 4
recent_apps = adb shell input keyevent 187
adb = adb shell
switch_app = adb shell input keyevent 187 & adb shell input keyevent 187